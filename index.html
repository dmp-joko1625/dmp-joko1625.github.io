<!DOCTYPE html>
<html lang="en" data-theme="light" data-contrast="sc">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material 3 GitHub Pages</title>
  <link rel="stylesheet" href="theme.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Material Web Components -->
  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/"
      }
    }
  </script>
  <script type="module">
    import '@material/web/all.js';
    import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
    document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
  </script>
</head>

<body>
  <div class="main-container">
    <h1 class="md-typescale-display-medium">Hello Material!</h1>
    
    <div class="controls">
      <label class="md-typescale-label-large">Mode:</label>
      <select id="theme-mode">
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
      </select>

      <label class="md-typescale-label-large">Contrast:</label>
      <select id="theme-contrast">
        <option value="sc">Standard (SC)</option>
        <option value="mc">Medium (MC)</option>
        <option value="hc">High (HC)</option>
      </select>
    </div>

    <form>
      <p class="md-typescale-body-medium">Check out these controls in a form!</p>
      <md-checkbox touch-target="wrapper"></md-checkbox>
      <div class="radio-group">
        <md-radio name="group" value="1"></md-radio>
        <md-radio name="group" value="2"></md-radio>
        <md-radio name="group" value="3"></md-radio>
      </div>
      <md-outlined-text-field label="Favorite color" value="Purple"></md-outlined-text-field>
      <md-outlined-button type="reset">Reset</md-outlined-button>
    </form>

    <footer class="site-footer md-typescale-body-small">
      <p>&copy; 2026 Joko1625. All Rights Reserved.</p>     
    </footer>
  </div>
  <script src="theme.js"></script>
</body>
</html>
